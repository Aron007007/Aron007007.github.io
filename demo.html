<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>读取XLS所有表格数据</title>
    <!-- 引入SheetJS库（CDN方式） -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <input type="file" id="fileInput" accept=".xls,.xlsx" />
    <pre id="result"></pre> <!-- 用于展示解析结果 -->

    <script>
        // 获取DOM元素
        const fileInput = document.getElementById('fileInput');
        const resultContainer = document.getElementById('result');

        // 监听文件选择事件
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                // 1. 读取文件为二进制数据
                const arrayBuffer = await readFileAsArrayBuffer(file);
                // 2. 解析XLS文件
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                
                // 3. 遍历所有工作表，获取每个表格的数据
                const allSheetsData = {};
                workbook.SheetNames.forEach((sheetName) => {
                    // 将工作表转换为JSON格式（表头作为键名）
                    const sheetData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
                    allSheetsData[sheetName] = sheetData;
                });

                // 4. 展示结果（格式化输出）
                resultContainer.textContent = JSON.stringify(allSheetsData, null, 2);
                console.log('所有表格数据：', allSheetsData);


	

            } catch (error) {
                resultContainer.textContent = `解析失败：${error.message}`;
                console.error('解析错误：', error);
            }
        });

        // 辅助函数：将文件读取为ArrayBuffer
        function readFileAsArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(new Error('文件读取失败'));
                reader.readAsArrayBuffer(file);
            });
        }
    </script>
</body>
</html>
